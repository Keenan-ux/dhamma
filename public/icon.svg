<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background: cream tile with the app's rounded-corner radius.
       Matches manifest.webmanifest theme_color / background_color so
       the install icon, splash screen, and favicon all read as one. -->
  <rect width="512" height="512" rx="96" fill="#F6F2E8"/>

  <!-- Bodhi leaf, centred and slightly inset from the tile edges.
       Filled in warm gold to match the photographed reference; the
       midrib + pinnate side-vein pattern is drawn over the fill in
       a dim amber so the venation reads as part of the leaf rather
       than as separate lines. -->
  <g transform="translate(46 26) scale(0.82)">
    <!-- Leaf body. fill-opacity=0.65 makes the membrane translucent;
         the stroke on the same path redraws the silhouette at full
         opacity so the outline stays crisp. Together this gives the
         outline + veins + petiole more visual weight than the
         surface, the way a botanical-illustration line drawing does. -->
    <path
      fill="#D4A93B"
      fill-opacity="0.35"
      stroke="#D4A93B"
      stroke-width="5"
      stroke-linejoin="round"
      stroke-linecap="round"
      d="
        M 256 26
        C 246 50 230 78 210 108
        C 178 152 142 192 116 228
        C 92 264 78 304 80 348
        C 84 402 122 442 172 458
        C 196 464 222 466 252 472
        L 256 472
        L 260 472
        C 290 466 316 464 340 458
        C 390 442 428 402 432 348
        C 434 304 420 264 396 228
        C 370 192 334 152 302 108
        C 282 78 266 50 256 26
        Z
      "/>
    <!-- Petiole -->
    <path
      stroke="#D4A93B"
      stroke-width="10"
      stroke-linecap="round"
      d="M 256 472 L 256 498"/>
    <!-- Midrib -->
    <path
      stroke="#7E5A14"
      stroke-width="6"
      stroke-linecap="round"
      fill="none"
      opacity="0.55"
      d="M 256 470 L 256 90"/>
    <!-- Pinnate side veins -->
    <g
      stroke="#7E5A14"
      stroke-width="4"
      stroke-linecap="round"
      fill="none"
      opacity="0.45">
      <path d="M 256 420 Q 200 432 152 432"/>
      <path d="M 256 420 Q 312 432 360 432"/>

      <path d="M 256 348 Q 180 356 110 332"/>
      <path d="M 256 348 Q 332 356 402 332"/>

      <path d="M 256 276 Q 188 258 128 232"/>
      <path d="M 256 276 Q 324 258 384 232"/>

      <path d="M 256 204 Q 216 184 182 162"/>
      <path d="M 256 204 Q 296 184 330 162"/>

      <path d="M 256 138 Q 232 126 212 122"/>
      <path d="M 256 138 Q 280 126 300 122"/>
    </g>
  </g>
</svg>
