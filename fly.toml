# fly.toml app configuration file generated for dhamma on 2026-05-18T10:47:51-04:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'dhamma'
primary_region = 'iad'

[build]

[env]
  NODE_ENV = 'production'
  PORT = '8080'

[http_service]
  internal_port = 8080
  force_https = true
  # 'suspend' snapshots the live process state to disk on idle and
  # resumes from RAM on wake — keeps the BGE-M3 model already loaded
  # so Meaning-mode cold-start drops from ~120s (full ONNX init) to
  # ~10s (state restore). Fallback to 'stop' if the ONNX runtime ever
  # turns out not to suspend cleanly.
  auto_stop_machines = 'suspend'
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  memory = '4gb'
  cpu_kind = 'shared'
  cpus = 2
  memory_mb = 4096
