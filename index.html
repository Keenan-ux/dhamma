<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#1A1A1B" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="application-name" content="Dhamma data" />
    <meta name="description" content="Search the Pāli Buddhist canon — Tipiṭaka, commentaries, sub-commentaries — with cross-canon Sanskrit dictionary lookup." />
    <title>Dhamma data</title>
    <script>
      (function(){
        var t = localStorage.getItem('cabinet-theme');
        if (!t) t = window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
        document.documentElement.setAttribute('data-theme', t);
        var colors = { dark: '#1A1A1B', light: '#F6F2E8' };
        var meta = document.querySelector('meta[name="theme-color"]');
        if (meta && colors[t]) meta.setAttribute('content', colors[t]);
      })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Montserrat:wght@400;500;600;700&family=Noto+Serif:wght@400;600&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
